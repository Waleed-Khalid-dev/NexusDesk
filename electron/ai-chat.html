<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>AI Co-Pilot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg-deep:    hsl(240, 10%, 4%);
        --bg-base:    hsl(240, 8%, 7%);
        --bg-surface: hsl(240, 7%, 11%);
        --bg-raised:  hsl(240, 6%, 15%);
        --border:     hsl(240, 5%, 18%);
        --border-lit: hsl(240, 5%, 26%);
        --text-hi:    hsl(220, 15%, 96%);
        --text-mid:   hsl(220, 10%, 72%);
        --text-lo:    hsl(220, 8%, 42%);
        --accent-sky: hsl(200, 90%, 60%);
        --accent-sky-glow: hsla(200, 90%, 60%, 0.18);
        --accent-green: hsl(158, 64%, 52%);
        --accent-green-glow: hsla(158, 64%, 52%, 0.12);
        --accent-red: hsl(0, 72%, 58%);
        --accent-amber: hsl(38, 92%, 50%);
      }

      html, body {
        margin: 0;
        height: 100%;
        background: var(--bg-deep);
        color: var(--text-hi);
        font-family: 'Inter', system-ui, sans-serif;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ─── Header ────────────────────────────────────────────────── */
      .header {
        padding: 10px 14px;
        background: var(--bg-surface);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
        position: relative;
        overflow: hidden;
      }
      .header::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--accent-sky), transparent);
        opacity: 0.6;
      }
      .header-icon {
        width: 30px; height: 30px;
        background: linear-gradient(135deg, var(--accent-sky), hsl(220, 90%, 60%));
        border-radius: 8px;
        display: grid; place-items: center;
        box-shadow: 0 0 14px var(--accent-sky-glow);
        flex-shrink: 0;
      }
      .header-icon svg { width: 15px; height: 15px; color: #fff; }
      .header-label {
        flex: 1;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: -0.01em;
        color: var(--text-hi);
      }
      .header-label span {
        display: block;
        font-size: 10px;
        font-weight: 500;
        color: var(--text-lo);
        margin-top: 1px;
        letter-spacing: 0;
      }
      .header select {
        background: var(--bg-raised);
        border: 1px solid var(--border-lit);
        color: var(--text-mid);
        border-radius: 7px;
        padding: 5px 8px;
        font-size: 10px;
        font-family: 'Inter', sans-serif;
        outline: none;
        cursor: pointer;
        max-width: 140px;
        transition: 0.2s;
        -webkit-appearance: none;
      }
      .header select:hover {
        border-color: var(--accent-sky);
        color: var(--text-hi);
      }

      /* ─── Chat History ──────────────────────────────────────────── */
      .chat-history {
        flex: 1;
        overflow-y: auto;
        padding: 14px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        background: var(--bg-deep);
      }
      .chat-history::-webkit-scrollbar { width: 4px; }
      .chat-history::-webkit-scrollbar-track { background: transparent; }
      .chat-history::-webkit-scrollbar-thumb { background: var(--border-lit); border-radius: 4px; }
      .chat-history::-webkit-scrollbar-thumb:hover { background: var(--text-lo); }

      .msg {
        max-width: 88%;
        padding: 9px 13px;
        border-radius: 14px;
        font-size: 12.5px;
        line-height: 1.6;
        word-wrap: break-word;
        animation: msg-in 0.2s ease-out;
      }
      @keyframes msg-in {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .msg-user {
        align-self: flex-end;
        background: var(--bg-raised);
        color: var(--text-hi);
        border: 1px solid var(--border-lit);
        border-bottom-right-radius: 4px;
      }
      .msg-ai {
        align-self: flex-start;
        background: linear-gradient(135deg, hsla(200, 90%, 60%, 0.07), hsla(200, 90%, 60%, 0.03));
        border: 1px solid hsla(200, 90%, 60%, 0.18);
        color: var(--text-hi);
        border-bottom-left-radius: 4px;
      }
      .msg-ai strong { color: var(--accent-sky); }
      .msg-ai em { color: var(--text-mid); font-style: normal; }

      /* ─── Loading Dots ──────────────────────────────────────────── */
      .loading {
        align-self: flex-start;
        display: none;
        align-items: center;
        gap: 5px;
        padding: 10px 14px;
        background: var(--bg-surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        border-bottom-left-radius: 4px;
      }
      .loading span {
        width: 5px; height: 5px; border-radius: 50%;
        background: var(--accent-sky);
        animation: bounce 1.3s infinite ease-in-out both;
        opacity: 0.7;
      }
      .loading span:nth-child(1) { animation-delay: -0.32s; }
      .loading span:nth-child(2) { animation-delay: -0.16s; }
      @keyframes bounce {
        0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
        40% { transform: scale(1); opacity: 1; }
      }

      /* ─── Input Area ────────────────────────────────────────────── */
      .input-area {
        padding: 10px 12px;
        background: var(--bg-surface);
        border-top: 1px solid var(--border);
        display: flex;
        gap: 8px;
        align-items: center;
        flex-shrink: 0;
      }
      .input-area input {
        flex: 1;
        background: var(--bg-raised);
        border: 1px solid var(--border-lit);
        color: var(--text-hi);
        padding: 9px 13px;
        border-radius: 10px;
        font-family: 'Inter', sans-serif;
        font-size: 12.5px;
        outline: none;
        transition: 0.2s;
        caret-color: var(--accent-sky);
      }
      .input-area input::placeholder { color: var(--text-lo); }
      .input-area input:focus {
        border-color: var(--accent-sky);
        box-shadow: 0 0 0 2px var(--accent-sky-glow);
        background: var(--bg-base);
      }
      .input-area button {
        background: linear-gradient(180deg, var(--accent-sky), hsl(205, 90%, 48%));
        color: #fff;
        border: none;
        border-radius: 10px;
        width: 36px; height: 36px;
        cursor: pointer;
        display: grid; place-items: center;
        transition: 0.2s;
        box-shadow: 0 2px 8px hsla(200, 90%, 60%, 0.25);
        flex-shrink: 0;
      }
      .input-area button:hover {
        transform: scale(1.05);
        box-shadow: 0 4px 16px hsla(200, 90%, 60%, 0.4);
      }
      .input-area button:active { transform: scale(0.97); }
      .input-area button svg { width: 15px; height: 15px; }

      /* ─── Resize Handle ──────────────────────────────────────────── */
      .resize-handle {
        position: absolute;
        top: 0; left: 0; bottom: 0; width: 6px;
        cursor: ew-resize;
        z-index: 999;
        transition: 0.2s;
      }
      .resize-handle:hover {
        background: linear-gradient(90deg, var(--accent-sky-glow), transparent);
      }

      /* ─── Trade Proposal Card ───────────────────────────────────── */
      .trade-proposal-card {
        margin-top: 10px;
        background: linear-gradient(135deg, var(--accent-green-glow), transparent);
        border: 1px solid hsla(158, 64%, 52%, 0.25);
        border-radius: 10px;
        padding: 12px;
        font-size: 12px;
      }
      .trade-title {
        color: var(--accent-green);
        font-weight: 700;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .trade-details {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px 12px;
        margin-bottom: 12px;
      }
      .trade-details .td-item {
        font-size: 11px;
        color: var(--text-lo);
        display: flex;
        flex-direction: column;
        gap: 1px;
      }
      .trade-details .td-item strong {
        color: var(--text-hi);
        font-size: 12px;
        font-family: 'JetBrains Mono', monospace;
        font-weight: 600;
      }
      .btn-confirm-trade {
        background: linear-gradient(180deg, var(--accent-green), hsl(158, 70%, 38%));
        color: #fff;
        border: none;
        width: 100%;
        padding: 9px;
        border-radius: 8px;
        font-weight: 700;
        font-size: 12px;
        cursor: pointer;
        transition: 0.2s;
        letter-spacing: 0.02em;
        box-shadow: 0 2px 10px var(--accent-green-glow);
      }
      .btn-confirm-trade:hover {
        filter: brightness(1.1);
        box-shadow: 0 4px 16px hsla(158, 64%, 52%, 0.3);
      }
      .btn-confirm-trade:disabled {
        background: var(--bg-raised);
        color: var(--text-lo);
        cursor: not-allowed;
        box-shadow: none;
      }
      .trade-status { margin-top: 8px; font-size: 11px; display: none; }

      /* ─── Market Pulse Strip ─────────────────────────────────────── */
      .pulse-strip {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        background: var(--bg-surface);
        border-bottom: 1px solid var(--border);
        overflow-x: auto;
        scrollbar-width: none;
        flex-shrink: 0;
        font-size: 10px;
        flex-wrap: nowrap;
      }
      .pulse-strip::-webkit-scrollbar { display: none; }
      .pulse-pill {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 2px 8px;
        border-radius: 20px;
        font-size: 10px;
        font-weight: 600;
        white-space: nowrap;
        border: 1px solid transparent;
        transition: 0.2s;
        cursor: default;
      }
      .pulse-pill.fg-extreme-fear  { background: hsla(0,78%,62%,0.12); color: hsl(0,78%,70%); border-color: hsla(0,78%,62%,0.25); }
      .pulse-pill.fg-fear          { background: hsla(20,95%,58%,0.12); color: hsl(20,95%,68%); border-color: hsla(20,95%,58%,0.25); }
      .pulse-pill.fg-neutral       { background: hsla(40,95%,54%,0.12); color: hsl(40,95%,65%); border-color: hsla(40,95%,54%,0.25); }
      .pulse-pill.fg-greed         { background: hsla(80,65%,52%,0.12); color: hsl(80,65%,62%); border-color: hsla(80,65%,52%,0.25); }
      .pulse-pill.fg-extreme-greed { background: hsla(142,68%,52%,0.12); color: hsl(142,68%,62%); border-color: hsla(142,68%,52%,0.25); }
      .pulse-pill.altseason        { background: hsla(200,90%,60%,0.12); color: hsl(200,90%,70%); border-color: hsla(200,90%,60%,0.25); }
      .pulse-pill.btcdom           { background: hsla(38,92%,50%,0.12); color: hsl(38,92%,62%); border-color: hsla(38,92%,50%,0.25); }
      .pulse-pill.gainer           { background: hsla(142,68%,52%,0.10); color: hsl(142,68%,62%); border-color: hsla(142,68%,52%,0.2); }
      .pulse-pill.loser            { background: hsla(0,78%,62%,0.10); color: hsl(0,78%,70%); border-color: hsla(0,78%,62%,0.2); }
      .pulse-divider { width: 1px; height: 12px; background: var(--border-lit); flex-shrink: 0; }
      .pulse-refresh {
        margin-left: auto;
        background: none;
        border: 1px solid var(--border-lit);
        color: var(--text-lo);
        border-radius: 5px;
        padding: 2px 7px;
        font-size: 9px;
        cursor: pointer;
        flex-shrink: 0;
        transition: 0.2s;
        font-family: 'Inter', sans-serif;
      }
      .pulse-refresh:hover { border-color: var(--accent-sky); color: var(--accent-sky); }
      .pulse-loading { color: var(--text-lo); font-size: 10px; padding: 0 4px; }
      
      .btn-expand-pulse {
        margin-left: 6px;
        background: linear-gradient(135deg, hsla(200, 90%, 60%, 0.15), transparent);
        border: 1px solid var(--accent-sky-glow);
        color: var(--accent-sky);
        border-radius: 5px;
        padding: 2px 7px;
        font-size: 9px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.2s;
        flex-shrink: 0;
      }
      .btn-expand-pulse:hover {
        background: var(--accent-sky);
        color: #fff;
      }
    </style>
  </head>
  <body>
    <div class="resize-handle" id="aiResizeHandle"></div>
    <div class="header">
      <div class="header-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 1 0 10 10H12V2z"/><path d="M12 12 2.1 7.1"/><path d="M12 12l9.9 4.9"/></svg>
      </div>
      <div class="header-label">
        AI Co-Pilot
        <span>Powered by Google Gemini</span>
      </div>
      <select id="modelSelect">
        <option value="gemini-1.5-flash-latest">Loading Models...</option>
      </select>
    </div>

    <!-- Market Pulse Strip -->
    <div class="pulse-strip" id="pulseStrip">
      <span class="pulse-loading" id="pulseLoading">⏳ Loading market data...</span>
    </div>

    <div class="chat-history" id="history">
      <div class="msg msg-ai">
        Hello! I'm your AI trading co-pilot. Ask me about arbitrage opportunities, risk analysis, or to prepare a trade.
      </div>
      <div class="loading" id="loader">
        <span></span><span></span><span></span>
      </div>
    </div>

    <div class="input-area">
      <input type="text" id="prompt" placeholder="Ask anything about the market..." autocomplete="off" />
      <button id="sendBtn" title="Send">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>

    <script>
      const { ipcRenderer } = require("electron");

      const promptInput = document.getElementById("prompt");
      const sendBtn = document.getElementById("sendBtn");
      const historyBox = document.getElementById("history");
      const loader = document.getElementById("loader");
      const modelSelect = document.getElementById("modelSelect");
      const pulseStrip = document.getElementById("pulseStrip");

      // ── Market Pulse Strip ──────────────────────────────────────────────────
      function fgClass(label) {
        const l = (label || '').toLowerCase();
        if (l.includes('extreme fear')) return 'fg-extreme-fear';
        if (l.includes('fear')) return 'fg-fear';
        if (l.includes('extreme greed')) return 'fg-extreme-greed';
        if (l.includes('greed')) return 'fg-greed';
        return 'fg-neutral';
      }

      function renderPulse(pulse) {
        if (!pulse) { pulseStrip.innerHTML = '<span class="pulse-loading">⚠️ Market data unavailable</span>'; return; }
        const parts = [];

        if (pulse.fearGreed) {
          const fg = pulse.fearGreed;
          const cls = fgClass(fg.label);
          parts.push(`<span class="pulse-pill ${cls}" title="${fg.interpretation}">😱 F&G: ${fg.value} ${fg.label}</span>`);
        }

        if (pulse.altcoinSeason) {
          const as = pulse.altcoinSeason;
          parts.push(`<span class="pulse-pill altseason" title="${as.interpretation}">🌊 ${as.label} (${as.score}/100)</span>`);
        }

        if (pulse.global) {
          const g = pulse.global;
          const dom = g.btcDominance?.toFixed(1);
          parts.push(`<span class="pulse-divider"></span>`);
          parts.push(`<span class="pulse-pill btcdom" title="BTC Market Dominance">₿ Dom: ${dom}%</span>`);
        }

        if (pulse.gainers?.length > 0) {
          parts.push(`<span class="pulse-divider"></span>`);
          const top3 = pulse.gainers.slice(0, 3).map(c => `${c.symbol} +${c.change24h?.toFixed(1)}%`).join(' · ');
          parts.push(`<span class="pulse-pill gainer" title="Top Gainers (24h)">▲ ${top3}</span>`);
        }

        if (pulse.losers?.length > 0) {
          const top3 = pulse.losers.slice(0, 3).map(c => `${c.symbol} ${c.change24h?.toFixed(1)}%`).join(' · ');
          parts.push(`<span class="pulse-pill loser" title="Top Losers (24h)">▼ ${top3}</span>`);
        }

        const ts = pulse.fetchedAt ? new Date(pulse.fetchedAt).toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' }) : '';
        parts.push(`<button class="pulse-refresh" id="pulseRefreshBtn" title="Refresh market data">↻ ${ts}</button>`);
        parts.push(`<button class="btn-expand-pulse" id="btnExpandPulse" title="Open Market Intelligence Dashboard">↗ Expand</button>`);

        pulseStrip.innerHTML = parts.join('');

        document.getElementById('pulseRefreshBtn')?.addEventListener('click', () => loadMarketPulse(true));
        document.getElementById('btnExpandPulse')?.addEventListener('click', () => {
          ipcRenderer.send('open-market-intel');
        });
      }

      async function loadMarketPulse(force = false) {
        if (!force) pulseStrip.innerHTML = '<span class="pulse-loading">⏳ Loading market data...</span>';
        try {
          const res = await ipcRenderer.invoke('get-market-pulse');
          if (res.success) renderPulse(res.pulse);
          else pulseStrip.innerHTML = `<span class="pulse-loading">ℹ️ Add CMC key in Vault for live market data</span>`;
        } catch (e) {
          pulseStrip.innerHTML = `<span class="pulse-loading">⚠️ ${e.message}</span>`;
        }
      }

      loadMarketPulse();
      // Auto-refresh every 15 minutes
      setInterval(() => loadMarketPulse(true), 15 * 60 * 1000);

      async function loadModels() {
        try {
          const res = await ipcRenderer.invoke("get-ai-models");
          if (res.success && res.models && res.models.length > 0) {
            modelSelect.innerHTML = "";
            res.models.forEach(m => {
              const opt = document.createElement("option");
              opt.value = m.id;
              opt.textContent = m.displayName;
              modelSelect.appendChild(opt);
            });

            // Try to default to "Gemini Flash Latest" by ID or display name
            const preferredIds = ["gemini-1.5-flash-latest", "gemini-flash-latest"];
            const preferredNames = ["gemini flash latest", "gemini 1.5 flash latest"];
            let matched = false;
            for (const id of preferredIds) {
              const opt = Array.from(modelSelect.options).find(o => o.value === id);
              if (opt) { modelSelect.value = id; matched = true; break; }
            }
            if (!matched) {
              const opt = Array.from(modelSelect.options).find(o =>
                preferredNames.includes(o.textContent.toLowerCase())
              );
              if (opt) { modelSelect.value = opt.value; }
            }
          } else {
            modelSelect.innerHTML = `<option value="latest-free-auto">Failed to load models</option>`;
          }
        } catch (e) {
          modelSelect.innerHTML = `<option value="gemini-1.5-flash-latest">Error loading models</option>`;
        }
      }
      loadModels();

      function addMsg(text, isUser) {
        const div = document.createElement("div");
        div.className = "msg " + (isUser ? "msg-user" : "msg-ai");

        let tradeData = null;
        if (!isUser) {
          const tradeRegex = /<TRADE>([\s\S]*?)<\/TRADE>/;
          const match = text.match(tradeRegex);
          if (match) {
            try { tradeData = JSON.parse(match[1].trim()); } catch(e) { console.error("Trade JSON parse error:", e); }
            text = text.replace(tradeRegex, "").trim();
          }
        }

        let safeText = text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
        safeText = safeText.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
        div.innerHTML = safeText;

        if (tradeData) {
          const tradeCard = document.createElement("div");
          tradeCard.className = "trade-proposal-card";
          const sideColor = tradeData.side?.toLowerCase() === 'buy' ? 'var(--accent-green)' : 'var(--accent-red)';
          tradeCard.innerHTML = `
            <div class="trade-title">
              <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
              Trade Proposal — Review Before Confirming
            </div>
            <div class="trade-details">
              <div class="td-item"><span>Exchange</span><strong>${(tradeData.exchange || '—').toUpperCase()}</strong></div>
              <div class="td-item"><span>Pair</span><strong>${tradeData.symbol || '—'}</strong></div>
              <div class="td-item"><span>Side</span><strong style="color: ${sideColor}">${(tradeData.side || '—').toUpperCase()}</strong></div>
              <div class="td-item"><span>Type</span><strong>${(tradeData.type || 'MARKET').toUpperCase()}</strong></div>
              <div class="td-item" style="grid-column: span 2;"><span>Amount</span><strong>${tradeData.amount}</strong></div>
            </div>
            <button class="btn-confirm-trade">🔐 Confirm & Execute Trade</button>
            <div class="trade-status"></div>
          `;
          const confirmBtn = tradeCard.querySelector(".btn-confirm-trade");
          const statusDiv = tradeCard.querySelector(".trade-status");

          confirmBtn.onclick = async () => {
            confirmBtn.disabled = true;
            confirmBtn.textContent = "Executing...";
            statusDiv.style.display = "none";
            try {
              const res = await ipcRenderer.invoke('execute-trade', tradeData);
              statusDiv.style.display = "block";
              if (res.success) {
                statusDiv.innerHTML = `<span style="color: var(--accent-green)">✓ Success! Order ID: ${res.orderId} · Est. $${res.usdValue}</span>`;
                confirmBtn.style.display = "none";
              } else {
                statusDiv.innerHTML = `<span style="color: var(--accent-red)">✗ Failed: ${res.error}</span>`;
                confirmBtn.disabled = false;
                confirmBtn.textContent = "🔐 Confirm & Execute Trade";
              }
            } catch(e) {
              statusDiv.style.display = "block";
              statusDiv.innerHTML = `<span style="color: var(--accent-red)">✗ Error: ${e.message}</span>`;
              confirmBtn.disabled = false;
              confirmBtn.textContent = "🔐 Confirm & Execute Trade";
            }
          };
          div.appendChild(tradeCard);
        }

        historyBox.insertBefore(div, loader);
        historyBox.scrollTop = historyBox.scrollHeight;
      }

      async function sendPrompt() {
        const text = promptInput.value.trim();
        if (!text) return;
        const selectedModel = document.getElementById("modelSelect").value;
        addMsg(text, true);
        promptInput.value = "";
        loader.style.display = "flex";
        historyBox.scrollTop = historyBox.scrollHeight;
        try {
          const res = await ipcRenderer.invoke("chat-with-ai", text, selectedModel);
          loader.style.display = "none";
          if (res.success) {
            addMsg(res.text, false);
          } else {
            addMsg(`<em>Error: ${res.error}</em>`, false);
          }
        } catch (e) {
          loader.style.display = "none";
          addMsg(`<em>System Error: ${e.message}</em>`, false);
        }
      }

      sendBtn.onclick = sendPrompt;
      promptInput.addEventListener("keydown", (e) => { if (e.key === "Enter") sendPrompt(); });

      // ── AI Resize Handle ────────────────────────────────────────────────────
      const aiResizeHandle = document.getElementById("aiResizeHandle");
      let isResizing = false;

      aiResizeHandle.addEventListener("mousedown", (e) => {
        isResizing = true;
        document.body.style.userSelect = "none";
        ipcRenderer.send("start-resize", { side: "ai-left", screenX: e.screenX, screenY: e.screenY });
      });

      window.addEventListener("mousemove", (e) => {
        if (!isResizing) return;
        ipcRenderer.send("resize-to", { screenX: e.screenX, screenY: e.screenY });
      });

      window.addEventListener("mouseup", () => {
        if (isResizing) {
          isResizing = false;
          document.body.style.userSelect = "";
          ipcRenderer.send("end-resize");
        }
      });
    </script>
  </body>
</html>
