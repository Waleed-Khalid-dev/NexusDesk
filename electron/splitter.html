<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'"
    />
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #27272a;
        cursor: col-resize;
      }
      body:hover,
      body.dragging {
        background: #10b981;
      }
      .grip {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 3px;
        height: 56px;
        border-radius: 2px;
        background: #71717a;
        pointer-events: none;
      }
      body:hover .grip,
      body.dragging .grip {
        background: #052e16;
      }
    </style>
  </head>
  <body>
    <div class="grip"></div>
    <script>
      const side = new URLSearchParams(location.search).get("side") || "left";
      const isHorizontal = side === "bottom";
      
      if (isHorizontal) {
        document.body.style.cursor = "row-resize";
        const grip = document.querySelector(".grip");
        grip.style.width = "56px";
        grip.style.height = "3px";
      }

      let dragging = false;

      document.body.addEventListener("pointerdown", (e) => {
        dragging = true;
        document.body.classList.add("dragging");
        document.body.setPointerCapture(e.pointerId);
        window.hub.startResize(side, e.screenX, e.screenY);
        e.preventDefault();
      });

      document.body.addEventListener("pointermove", (e) => {
        if (!dragging) return;
        window.hub.resizeTo(e.screenX, e.screenY);
      });

      function end(e) {
        if (!dragging) return;
        dragging = false;
        document.body.classList.remove("dragging");
        try {
          document.body.releasePointerCapture(e.pointerId);
        } catch (_) {}
        window.hub.endResize();
      }

      document.body.addEventListener("pointerup", end);
      document.body.addEventListener("pointercancel", end);
    </script>
  </body>
</html>
